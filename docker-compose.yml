services:
  sv-niederklein-website:
    build:
      context: .
      args:
        VITE_FUSSBALL_API_TOKEN: ${VITE_FUSSBALL_API_TOKEN:-}
    container_name: sv-niederklein-website
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - openclaw-net

networks:
  openclaw-net:
    external: true
